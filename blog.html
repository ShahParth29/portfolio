<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — NPJ Productions</title>
    <meta name="description" content="Cinematic production tips, behind-the-scenes stories, editing tutorials, and camera reviews from NPJ Productions.">
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="img/favicon-512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://npjproductions.dpdns.org/blog.html">
    <meta property="og:title" content="Blog — NPJ Productions">
    <meta property="og:description" content="Cinematic production tips, behind-the-scenes stories, editing tutorials, and camera reviews from NPJ Productions.">
    <meta property="og:image" content="https://npjproductions.dpdns.org/img/favicon-512x512.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://npjproductions.dpdns.org/blog.html">
    <meta property="twitter:title" content="Blog — NPJ Productions">
    <meta property="twitter:description" content="Cinematic production tips, behind-the-scenes stories, editing tutorials, and camera reviews from NPJ Productions.">
    <meta property="twitter:image" content="https://npjproductions.dpdns.org/img/favicon-512x512.png">
</head>
<body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress-bar" id="scroll-progress"></div>

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="img/logo.webp" alt="NPJ Productions Logo" class="nav-logo-img">
                <span class="setting-site_name">NPJ Productions</span>
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="works.html">Works</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="contact.html" class="nav-cta">Hire Us</a></li>
            </ul>
        </div>
    </nav>

    <!-- ── Blog Page ──────────────────────────────────────────────────────── -->
    <main class="blog-page">
        <div class="container">
            <div class="page-header fade-in animate-entrance stagger-1">
                <h1>The <span class="accent-text">Blog</span></h1>
                <p>Tips, tutorials, behind-the-scenes stories, and gear reviews</p>
            </div>

            <!-- Category Filter -->
            <div class="filter-bar fade-in animate-entrance stagger-2" id="blog-filter-bar">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="tips">Tips</button>
                <button class="filter-btn" data-category="behind-the-scenes">Behind the Scenes</button>
                <button class="filter-btn" data-category="gear">Gear</button>
            </div>

            <div class="blog-grid animate-entrance stagger-3" id="blog-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="footer" style="margin-top: 80px;">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 <span class="setting-site_name">NPJ Productions</span>. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
    <script src="js/api.js"></script>
    <script>
        /* ── Scroll Progress Indicator ──────────────────────────────────────── */
        window.addEventListener("scroll", () => {
            const scrollProgress = document.getElementById("scroll-progress");
            if (scrollProgress) {
                const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (totalHeight > 0) {
                    const progress = (window.scrollY / totalHeight) * 100;
                    scrollProgress.style.width = progress + "%";
                }
            }
        });

        /* Nav toggle */
        const navToggle = document.getElementById("nav-toggle");
        const navLinks = document.getElementById("nav-links");
        navToggle.addEventListener("click", () => {
            navToggle.classList.toggle("active");
            navLinks.classList.toggle("open");
        });

        window.addEventListener("scroll", () => {
            document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50);
        });

        /* Fade-in */
        const observer = new IntersectionObserver(
            (entries) => entries.forEach((e) => {
                if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); }
            }),
            { threshold: 0.15 }
        );
        document.querySelectorAll(".fade-in").forEach((el) => observer.observe(el));

        /* ── Load Blog Posts ────────────────────────────────────────────────── */
        let allPosts = [];
        let currentBlogCategory = "all";

        async function loadBlog() {
            const grid = document.getElementById("blog-grid");
            try {
                allPosts = await fetchBlogPosts();
                renderBlogGrid(allPosts);
            } catch (err) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>Could not load blog posts.</p></div>';
                console.error(err);
            }
        }

        function renderBlogGrid(posts) {
            const grid = document.getElementById("blog-grid");
            if (posts.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📝</div><p>No posts in this category yet.</p></div>';
                return;
            }

            grid.innerHTML = posts.map(p => {
                const excerpt = p.content.replace(/[#*_\[\]]/g, '').substring(0, 150) + '...';
                const dateStr = new Date(p.created_at).toLocaleDateString('en-IN', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                return `
                <div class="blog-card glass-card fade-in">
                    ${p.cover_image_url ? `
                    <div class="blog-card-image">
                        <img src="${p.cover_image_url}" alt="${p.title}" loading="lazy">
                    </div>` : ''}
                    <div class="blog-card-body">
                        <div class="blog-card-meta">
                            <span class="category-badge">${p.category}</span>
                            <span style="color:var(--text-muted);font-size:0.8rem;">${dateStr}</span>
                        </div>
                        <h3>${p.title}</h3>
                        <p>${excerpt}</p>
                        <a href="post.html?slug=${p.slug}" class="read-more">Read More →</a>
                    </div>
                </div>`;
            }).join('');

            requestAnimationFrame(() => {
                grid.querySelectorAll(".fade-in").forEach((el, i) => {
                    setTimeout(() => el.classList.add("visible"), i * 100);
                });
            });
        }

        /* ── Blog Category Filter ──────────────────────────────────────────── */
        document.getElementById("blog-filter-bar").addEventListener("click", (e) => {
            const btn = e.target.closest(".filter-btn");
            if (!btn) return;

            const category = btn.dataset.category;
            currentBlogCategory = category;

            document.querySelectorAll("#blog-filter-bar .filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (category === "all") {
                renderBlogGrid(allPosts);
            } else {
                renderBlogGrid(allPosts.filter(p => p.category === category));
            }
        });

        loadBlog();
    </script>
</body>
</html>
