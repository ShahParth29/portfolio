<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works — NPJ Productions</title>
    <meta name="description" content="Browse NPJ Productions' cinematic works. Commercials, wedding documentary films, and cinematic reels.">
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="img/favicon-512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://npjproductions.com/works.html">
    <meta property="og:title" content="Works — NPJ Productions">
    <meta property="og:description" content="Browse NPJ Productions' cinematic works. Commercials, wedding documentary films, and cinematic reels.">
    <meta property="og:image" content="https://npjproductions.com/img/favicon-512x512.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://npjproductions.com/works.html">
    <meta property="twitter:title" content="Works — NPJ Productions">
    <meta property="twitter:description" content="Browse NPJ Productions' cinematic works. Commercials, wedding documentary films, and cinematic reels.">
    <meta property="twitter:image" content="https://npjproductions.com/img/favicon-512x512.png">
</head>
<body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress-bar" id="scroll-progress"></div>

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="img/logo.webp" alt="NPJ Productions Logo" class="nav-logo-img">
                <span class="setting-site_name">NPJ Productions</span>
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="works.html" class="active">Works</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="nav-cta">Hire Us</a></li>
            </ul>
        </div>
    </nav>

    <!-- ── Page Content ───────────────────────────────────────────────────── -->
    <main class="contact-page">
        <div class="container">
            <div class="page-header fade-in animate-entrance stagger-1">
                <h1>Our <span class="accent-text">Films</span></h1>
                <p>Browse our catalog of commercials, wedding documentary films, and cinematic reels</p>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar fade-in animate-entrance stagger-2" id="filter-bar">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="cinematic">Cinematic</button>
                <button class="filter-btn" data-category="reels">Reels</button>
                <button class="filter-btn" data-category="wedding">Wedding</button>
            </div>

            <!-- Video Grid -->
            <div class="video-grid animate-entrance stagger-3" id="video-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <!-- ── Lightbox ───────────────────────────────────────────────────────── -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content">
            <iframe id="lightbox-iframe" src="" allowfullscreen
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
        </div>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 <span class="setting-site_name">NPJ Productions</span>. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
    <script src="js/api.js"></script>
    <script src="js/gallery.js"></script>
    <script>
        /* ── Scroll Progress Indicator ──────────────────────────────────────── */
        window.addEventListener("scroll", () => {
            const scrollProgress = document.getElementById("scroll-progress");
            if (scrollProgress) {
                const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (totalHeight > 0) {
                    const progress = (window.scrollY / totalHeight) * 100;
                    scrollProgress.style.width = progress + "%";
                }
            }
        });

        /* Nav toggle */
        const navToggle = document.getElementById("nav-toggle");
        const navLinks = document.getElementById("nav-links");
        navToggle.addEventListener("click", () => {
            navToggle.classList.toggle("active");
            navLinks.classList.toggle("open");
        });

        window.addEventListener("scroll", () => {
            document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50);
        });

        /* Fade-in observer */
        const observer = new IntersectionObserver(
            (entries) => entries.forEach((e) => {
                if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); }
            }),
            { threshold: 0.15 }
        );
        document.querySelectorAll(".fade-in").forEach((el) => observer.observe(el));

        /* Init Gallery */
        initGallery();
    </script>
</body>
</html>
