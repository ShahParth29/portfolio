<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing — Dhruvam Productions</title>
    <meta name="description" content="Transparent pricing plans for cinematic video production, editing, and direction services. High-end wedding documentary highlights, corporate ads, and creative reels.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress-bar" id="scroll-progress"></div>

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="img/logo.png" alt="Dhruvam Productions" class="nav-logo-img">
                <span class="setting-site_name">Dhruvam Productions</span>
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="pricing.html" class="active">Pricing</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="nav-cta">Hire Me</a></li>
            </ul>
        </div>
    </nav>

    <!-- ── Pricing Page ───────────────────────────────────────────────────── -->
    <main class="pricing-page">
        <div class="container">
            <div class="page-header fade-in">
                <h1>Simple, transparent <span class="accent-text">pricing</span></h1>
                <p>Choose a plan that fits your project. Need something custom? Just reach out.</p>
            </div>

            <div class="pricing-grid animate-entrance stagger-1" id="pricing-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>

            <div style="text-align:center; margin-top:48px;" class="fade-in animate-entrance stagger-2">
                <p style="color:var(--text-secondary); margin-bottom:16px;">Need a custom package? Let's talk.</p>
                <a href="contact.html" class="btn btn-secondary">Get Custom Quote →</a>
            </div>
        </div>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="footer" style="margin-top: 80px;">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 <span class="setting-site_name">Dhruvam Productions</span>. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
    <script src="js/api.js"></script>
    <script>
        /* ── Scroll Progress Indicator ──────────────────────────────────────── */
        window.addEventListener("scroll", () => {
            const scrollProgress = document.getElementById("scroll-progress");
            if (scrollProgress) {
                const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (totalHeight > 0) {
                    const progress = (window.scrollY / totalHeight) * 100;
                    scrollProgress.style.width = progress + "%";
                }
            }
        });

        /* Nav toggle */
        const navToggle = document.getElementById("nav-toggle");
        const navLinks = document.getElementById("nav-links");
        navToggle.addEventListener("click", () => {
            navToggle.classList.toggle("active");
            navLinks.classList.toggle("open");
        });

        window.addEventListener("scroll", () => {
            document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50);
        });

        /* Fade-in */
        const observer = new IntersectionObserver(
            (entries) => entries.forEach((e) => {
                if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); }
            }),
            { threshold: 0.15 }
        );
        document.querySelectorAll(".fade-in").forEach((el) => observer.observe(el));

        /* ── Load Pricing Plans ─────────────────────────────────────────────── */
        async function loadPricing() {
            const grid = document.getElementById("pricing-grid");
            try {
                const plans = await fetchPricingPlans();
                if (plans.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>Pricing plans coming soon.</p></div>';
                    return;
                }

                grid.innerHTML = plans.map((plan) => {
                    const features = plan.features.split(",").map(f => f.trim()).filter(Boolean);
                    const originalPriceText = plan.original_price && plan.original_price > plan.price
                        ? `<span class="original-price" style="text-decoration: line-through; color: var(--text-muted); font-size: 1.1rem; margin-left: 8px;">₹${plan.original_price.toLocaleString('en-IN')}</span>`
                        : '';
                    const discountBadge = plan.original_price && plan.original_price > plan.price
                        ? `<div class="discount-badge" style="display: inline-block; background: var(--success); color: var(--bg-primary); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;">Save ${Math.round((1 - plan.price/plan.original_price)*100)}%</div>`
                        : '';
                    return `
                    <div class="pricing-card glass-card ${plan.is_popular ? 'popular' : ''} fade-in">
                        ${plan.is_popular ? '<div class="popular-badge">Most Popular</div>' : ''}
                        ${discountBadge}
                        <h3>${plan.name}</h3>
                        <div class="pricing-price">₹${plan.price.toLocaleString('en-IN')}${originalPriceText}<span> / project</span></div>
                        <ul class="pricing-features">
                            ${features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        <a href="contact.html" class="btn ${plan.is_popular ? 'btn-primary btn-glow-pulse' : 'btn-secondary'}">
                            Get Started →
                        </a>
                    </div>`;
                }).join('');

                requestAnimationFrame(() => {
                    grid.querySelectorAll(".fade-in").forEach((el, i) => {
                        setTimeout(() => el.classList.add("visible"), i * 150);
                    });
                });
            } catch (err) {
                grid.innerHTML = '<div class="empty-state"><p>Could not load pricing. Is the backend running?</p></div>';
                console.error(err);
            }
        }

        loadPricing();
    </script>
</body>
</html>
