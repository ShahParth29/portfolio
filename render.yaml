services:
  - type: web
    name: parth-edits-api
    env: python
    plan: free # Change to starter to support persistent disks
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    # To enable persistent storage for uploads & database:
    # 1. Change plan from 'free' to 'starter'
    # 2. Uncomment the 'disk' section below:
    # disk:
    #   name: portfolio-data
    #   mountPath: /data
    #   sizeGB: 1

    envVars:
      - key: DATABASE_URL
        value: sqlite:///./portfolio.db # Change to sqlite:////data/portfolio.db if using persistent disk
      - key: UPLOAD_DIR
        value: frontend/uploads # Change to /data/uploads if using persistent disk
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        value: shahparth29980@gmail.com

